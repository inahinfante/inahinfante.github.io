# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole 
# blog, values which you are expected to set up once and rarely 
# edit after that. If you find yourself editing this file very 
# often, consider using Jekyll's data files feature for the data 
# you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded 
# automatically when you use 'bundle exec jekyll serve'. If you 
# change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick 
# references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Theme Settings
#
# Review documentation to determine if you should use `theme` or 
# `remote_theme`
# https://mmistakes.github.io/minimal-mistakes/docs/quick-start-guide/#installing-the-theme


theme                   : minimal-mistakes-jekyll
minimal_mistakes_skin   : "default"


# Site settings
# These are used to personalize your new site. If you look in 
# the HTML files, you will see them accessed via 
# {{ site.title }}, {{ site.email }}, and so on. You can create 
# any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.


locale                  : "en-US"
title                   : inahinfante.github.io
title_separator         : " | "
# subtitle                :
name                    : "Inah Infante"
# description             :
url                     : ""
baseurl                 : ""
repository              : "inahinfante/inahinfante.github.io"
# teaser                  : 
# logo                    :
# masthead_title          :
words_per_minute        : 200


# Site Author
author:
  name             : "Inah Infante"
  # avatar           :
  bio              : "Computer Application Security Student"
  location         : "Waterloo, ON"
  # email            :
  links:
    - label        : "GitHub"
      icon         : "fab fa-fw fa-github"
      url          : "https://github.com/inahinfante"
    - label        : "LinkedIn"
      icon         : "fab fa-fw fa-linkedin"
      url          : "https://linkedin.com/in/inahinfante"

# Site Footer
footer:
  links:
    - label        : "GitHub"
      icon         : "fab fa-fw fa-github"
      url          : "https://github.com/inahinfante"
    - label        : "LinkedIn"
      icon         : "fab fa-fw fa-linkedin"
      url          : "https://linkedin.com/in/inahinfante"
    

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be 
# automatically added to the internal "default list".
#
# Excluded items can be processed by explicitly listing the 
# directories or their entries' file path in the `include:` 
# list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/


markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Outputting
# permalink: /
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache


# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache


# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
  # _site
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      read_time: true